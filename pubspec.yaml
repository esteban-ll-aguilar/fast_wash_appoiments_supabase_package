name: fast_wash_appoiments_supabase_package
description: "Paquete de gestión de citas para lavado de vehículos con Supabase. Incluye validación de cédula ecuatoriana, gestión de usuarios, y CRUD completo de citas."
version: 0.0.1
homepage:

environment:
  sdk: ^3.10.8
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.1.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

